<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Smoke City Hustle • Rich Bizness</title><style>*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 0,#1b3220,#050705 58%,#000);color:#f7ffe8;font-family:Inter,system-ui,sans-serif;min-height:100vh}.app{max-width:1100px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}.top a,.top button,.controls button{border:1px solid rgba(157,255,99,.22);background:#08100a;color:#fff;border-radius:14px;padding:11px 14px;font-weight:900;text-decoration:none}.title{font-size:clamp(34px,7vw,76px);font-weight:1000;letter-spacing:-.08em;color:#ffe58a}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.hud span{padding:10px;border:1px solid rgba(157,255,99,.16);background:rgba(0,0,0,.38);border-radius:14px;text-align:center}.hud b{display:block;color:#9dff63;font-size:22px}canvas{width:100%;aspect-ratio:16/9;border-radius:24px;border:2px solid rgba(157,255,99,.25);background:#0d1710;box-shadow:0 30px 80px #000}.controls{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.controls button:first-child,.controls button:last-child{background:linear-gradient(135deg,#9dff63,#ffe58a);color:#061006;border:0}@media(max-width:650px){.hud,.controls{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><main class="app"><div class="top"><a href="/games/">← Games</a><div><div class="title">SMOKE CITY HUSTLE</div><small>Outrun heat, collect packages, and own the city route.</small></div><button id="restart">Restart</button></div><div class="hud"><span><b id="score">0</b>Score</span><span><b id="heat">0</b>Heat</span><span><b id="packages">0</b>Packages</span><span><b id="health">100</b>Health</span></div><canvas id="game" width="960" height="540"></canvas><div class="controls"><button data-a="left">LEFT</button><button data-a="up">GAS</button><button data-a="down">BRAKE</button><button data-a="right">RIGHT</button></div></main><script>const c=document.getElementById('game'),g=c.getContext('2d');let car,packages,cops,score,heat,health,frame,running;const $=id=>document.getElementById(id);function reset(){car={x:460,y:430,w:46,h:76,v:0};packages=[];cops=[];score=0;heat=0;health=100;frame=0;running=true;sync()}function sync(){$('score').textContent=score;$('heat').textContent=Math.floor(heat);$('packages').textContent=score<1?0:Math.floor(score/500);$('health').textContent=Math.max(0,Math.floor(health))}function spawn(){if(Math.random()>.45)packages.push({x:80+Math.random()*800,y:-40});else cops.push({x:80+Math.random()*800,y:-60,s:3+Math.random()*2})}function loop(){if(running){frame++;car.v=Math.min(10,car.v+.025);heat=Math.min(100,heat+.015);if(frame%70===0)spawn();for(const p of packages)p.y+=4+car.v*.45;for(const p of cops){p.y+=p.s+car.v*.35;p.x+=Math.sign(car.x-p.x)*.8}for(const p of packages){if(Math.abs((car.x+23)-(p.x+18))<38&&Math.abs((car.y+38)-(p.y+18))<50){p.hit=true;score+=500;heat=Math.max(0,heat-8)}}for(const p of cops){if(Math.abs((car.x+23)-(p.x+24))<42&&Math.abs((car.y+38)-(p.y+36))<58){p.hit=true;health-=20;heat+=12;if(health<=0)running=false}}packages=packages.filter(p=>p.y<600&&!p.hit);cops=cops.filter(p=>p.y<620&&!p.hit);score+=1;sync()}draw();requestAnimationFrame(loop)}function draw(){g.clearRect(0,0,960,540);g.fillStyle='#101710';g.fillRect(0,0,960,540);g.fillStyle='#2d2d2d';g.fillRect(180,0,600,540);g.strokeStyle='#ffe58a';g.lineWidth=8;g.setLineDash([30,28]);g.beginPath();g.moveTo(480,0);g.lineTo(480,540);g.stroke();g.setLineDash([]);g.font='50px system-ui';g.fillText('🚘',car.x,car.y+55);for(const p of packages){g.font='34px system-ui';g.fillText('📦',p.x,p.y+32)}for(const p of cops){g.font='44px system-ui';g.fillText('🚓',p.x,p.y+44)}if(!running){g.fillStyle='rgba(0,0,0,.68)';g.fillRect(0,0,960,540);g.fillStyle='#ffe58a';g.font='bold 54px system-ui';g.textAlign='center';g.fillText('BUSTED',480,250);g.font='24px system-ui';g.fillText('Restart the hustle',480,300);g.textAlign='start'}}function act(a){if(a==='left')car.x=Math.max(190,car.x-40);if(a==='right')car.x=Math.min(720,car.x+40);if(a==='up')car.v=Math.min(14,car.v+1.5);if(a==='down')car.v=Math.max(1,car.v-2)}document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>act(b.dataset.a));addEventListener('keydown',e=>act(e.key==='ArrowLeft'?'left':e.key==='ArrowRight'?'right':e.key==='ArrowUp'?'up':e.key==='ArrowDown'?'down':''));$('restart').onclick=reset;reset();loop()</script></body></html>
