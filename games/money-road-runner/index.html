<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Money Road Runner • Rich Bizness</title><style>*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 0,#163a18,#020402 55%,#000);color:#f7ffe8;font-family:Inter,system-ui,sans-serif;min-height:100vh;display:grid;place-items:center}.app{width:min(1100px,100%);padding:18px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.top a,.top button{color:#f7ffe8;text-decoration:none;border:1px solid rgba(157,255,99,.25);background:#071008;border-radius:14px;padding:10px 14px;font-weight:900}.title{font-size:clamp(34px,7vw,78px);font-weight:1000;letter-spacing:-.08em;color:#ffe58a}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}.hud span{background:rgba(0,0,0,.45);border:1px solid rgba(157,255,99,.18);border-radius:14px;padding:10px;text-align:center}.hud b{display:block;color:#9dff63;font-size:22px}canvas{width:100%;aspect-ratio:16/8;border:2px solid rgba(157,255,99,.3);border-radius:24px;background:linear-gradient(#173f22 0 52%,#3d2f1c 52% 100%);box-shadow:0 30px 80px #000}.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}.controls button{min-height:52px;border:0;border-radius:16px;font-weight:1000;background:linear-gradient(135deg,#9dff63,#ffe58a);color:#061006}.controls button:nth-child(2){background:#172219;color:#fff;border:1px solid rgba(157,255,99,.2)}@media(max-width:600px){.hud{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><main class="app"><div class="top"><a href="/games/">← Games</a><div><div class="title">MONEY ROAD RUNNER</div><small>Collect cash. Dodge tax blocks. Reach the treehouse.</small></div><button id="restart">Restart</button></div><div class="hud"><span><b id="score">0</b>Score</span><span><b id="cash">0</b>Cash</span><span><b id="distance">0</b>Distance</span><span><b id="lives">3</b>Lives</span></div><canvas id="game" width="960" height="480"></canvas><div class="controls"><button data-action="left">LEFT</button><button data-action="jump">JUMP</button><button data-action="right">RIGHT</button></div></main><script>const c=document.getElementById('game'),x=c.getContext('2d');let player,items,score,cash,distance,lives,running,frame;function reset(){player={x:120,y:360,w:54,h:70,vy:0};items=[];score=0;cash=0;distance=0;lives=3;running=true;frame=0;sync()}function sync(){scoreEl.textContent=score;cashEl.textContent=cash;distanceEl.textContent=Math.floor(distance);livesEl.textContent=lives}const scoreEl=document.getElementById('score'),cashEl=document.getElementById('cash'),distanceEl=document.getElementById('distance'),livesEl=document.getElementById('lives');function spawn(){const good=Math.random()>.32;items.push({x:960,y:good?330:360,w:good?34:50,h:good?34:60,type:good?'cash':'tax'})}function hit(a,b){return a.x<a.x+a.w&&a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function step(){if(running){frame++;distance+=.7;score+=1;if(frame%75===0)spawn();player.vy+=.8;player.y+=player.vy;if(player.y>360){player.y=360;player.vy=0}for(const it of items)it.x-=7+distance/500;for(const it of items){if(!it.done&&player.x<it.x+it.w&&player.x+player.w>it.x&&player.y<it.y+it.h&&player.y+player.h>it.y){it.done=true;if(it.type==='cash'){cash+=100;score+=500}else{lives--;score=Math.max(0,score-300);if(lives<=0)running=false}}}items=items.filter(i=>i.x>-80&&!i.done);sync()}draw();requestAnimationFrame(step)}function draw(){x.clearRect(0,0,c.width,c.height);x.fillStyle='#1a4c27';x.fillRect(0,0,960,255);x.fillStyle='#302419';x.fillRect(0,255,960,225);x.fillStyle='#9dff63';for(let i=0;i<12;i++)x.fillRect((i*100-distance*2)%1100,410,55,8);x.font='42px system-ui';x.fillText('🏃',player.x,player.y+52);for(const it of items){x.font=it.type==='cash'?'34px system-ui':'44px system-ui';x.fillText(it.type==='cash'?'💵':'🧱',it.x,it.y+40)}if(!running){x.fillStyle='rgba(0,0,0,.65)';x.fillRect(0,0,960,480);x.fillStyle='#ffe58a';x.font='bold 52px system-ui';x.textAlign='center';x.fillText('RUN OVER',480,220);x.font='24px system-ui';x.fillText('Tap Restart',480,270);x.textAlign='start'}}function act(a){if(a==='jump'&&player.y>=360)player.vy=-15;if(a==='left')player.x=Math.max(30,player.x-35);if(a==='right')player.x=Math.min(820,player.x+35)}document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>act(b.dataset.action));addEventListener('keydown',e=>act(e.key==='ArrowLeft'?'left':e.key==='ArrowRight'?'right':e.key==='ArrowUp'||e.key===' '?'jump':''));document.getElementById('restart').onclick=reset;reset();step()</script></body></html>
