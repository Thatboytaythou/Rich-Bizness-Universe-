<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Studio Showdown • Rich Bizness</title><style>*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% 0,#2f1f38,#080508 58%,#000);color:#fff7e6;font-family:Inter,system-ui,sans-serif;min-height:100vh}.app{max-width:1100px;margin:auto;padding:18px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.top a,.top button,.pads button{border:1px solid rgba(255,229,138,.24);background:#120c14;color:#fff;border-radius:14px;padding:11px 14px;font-weight:900;text-decoration:none}.title{font-size:clamp(34px,7vw,76px);font-weight:1000;letter-spacing:-.08em;color:#ffe58a}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.hud span{padding:10px;border:1px solid rgba(157,255,99,.15);background:rgba(0,0,0,.38);border-radius:14px;text-align:center}.hud b{display:block;color:#9dff63;font-size:22px}.stage{border:1px solid rgba(157,255,99,.2);border-radius:24px;padding:18px;background:linear-gradient(180deg,rgba(37,14,43,.82),rgba(0,0,0,.72));box-shadow:0 30px 80px #000}.meters{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}.meter{height:18px;background:#1b111f;border-radius:99px;overflow:hidden}.meter i{display:block;height:100%;width:50%;background:linear-gradient(90deg,#9dff63,#ffe58a)}.timeline{height:220px;display:grid;grid-template-columns:repeat(8,1fr);align-items:end;gap:8px;padding:18px;background:radial-gradient(circle at 50% 100%,rgba(157,255,99,.18),transparent 55%),#0b080c;border-radius:20px}.beat{height:30%;border-radius:10px 10px 0 0;background:linear-gradient(#ffe58a,#9dff63);opacity:.35;transition:.15s}.beat.active{opacity:1;transform:translateY(-10px);box-shadow:0 0 24px rgba(255,229,138,.5)}.pads{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.pads button{min-height:72px;font-size:16px}.pads button.primary{background:linear-gradient(135deg,#9dff63,#ffe58a);color:#061006;border:0}.log{margin-top:14px;max-height:160px;overflow:auto;padding:12px;border-radius:16px;background:rgba(0,0,0,.34)}@media(max-width:650px){.hud,.pads,.meters{grid-template-columns:1fr 1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><main class="app"><div class="top"><a href="/games/">← Games</a><div><div class="title">STUDIO SHOWDOWN</div><small>Build the cleaner track before your rival takes the room.</small></div><button id="restart">Restart</button></div><div class="hud"><span><b id="score">0</b>Score</span><span><b id="combo">0</b>Combo</span><span><b id="energy">100</b>Energy</span><span><b id="round">1</b>Round</span></div><section class="stage"><div class="meters"><div><small>Your Mix</small><div class="meter"><i id="playerMeter"></i></div></div><div><small>Rival Mix</small><div class="meter"><i id="rivalMeter"></i></div></div></div><div id="timeline" class="timeline"></div><div class="pads"><button data-pad="kick" class="primary">KICK</button><button data-pad="snare">SNARE</button><button data-pad="hat">HI-HAT</button><button data-pad="bass">BASS</button></div><div id="log" class="log">Press a pad on the glowing beat.</div></section></main><script>let score=0,combo=0,energy=100,round=1,step=0,player=50,rival=50,timer;const $=id=>document.getElementById(id),timeline=$('timeline');for(let i=0;i<8;i++){const b=document.createElement('div');b.className='beat';b.dataset.i=i;timeline.appendChild(b)}function sync(){$('score').textContent=score;$('combo').textContent=combo;$('energy').textContent=Math.max(0,Math.floor(energy));$('round').textContent=round;$('playerMeter').style.width=player+'%';$('rivalMeter').style.width=rival+'%'}function pulse(){document.querySelectorAll('.beat').forEach((b,i)=>b.classList.toggle('active',i===step));step=(step+1)%8;energy=Math.min(100,energy+.6);rival=Math.min(100,rival+.45);if(rival>=100){$('log').textContent='Rival won the room. Restart for a rematch.';clearInterval(timer)}sync()}function hit(pad){const active=(step+7)%8,perfect=active%4===0||pad==='hat';if(energy<8)return;if(perfect){combo++;score+=100+combo*15;player=Math.min(100,player+4);rival=Math.max(0,rival-2);$('log').textContent=`Perfect ${pad.toUpperCase()} hit • combo ${combo}`}else{combo=0;score=Math.max(0,score-40);player=Math.max(0,player-3);$('log').textContent=`Off-beat ${pad.toUpperCase()} • combo lost`}energy-=8;if(player>=100){round++;player=50;rival=50;score+=1000;$('log').textContent=`Round ${round-1} won • new showdown`}sync()}function reset(){clearInterval(timer);score=0;combo=0;energy=100;round=1;step=0;player=50;rival=50;sync();timer=setInterval(pulse,520)}document.querySelectorAll('[data-pad]').forEach(b=>b.onclick=()=>hit(b.dataset.pad));addEventListener('keydown',e=>{const map={a:'kick',s:'snare',d:'hat',f:'bass'};if(map[e.key.toLowerCase()])hit(map[e.key.toLowerCase()])});$('restart').onclick=reset;reset()</script></body></html>
