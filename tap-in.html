<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#020402"><title>Tap In | Rich Bizness</title><link rel="stylesheet" href="/src/theme.css"></head><body><main class="portal-shell"><header class="portal-topbar"><a class="brand-lockup" href="/"><span class="brand-orbit">RB</span><span><b>RICH BIZNESS</b><small>TAP IN</small></span></a></header><section class="portal-hero"><p class="portal-kicker">ONE ACCOUNT • EVERY WORLD</p><h1>TAP IN.</h1><form id="authForm" style="display:grid;gap:12px;max-width:430px"><input id="displayName" placeholder="Display name" style="padding:15px;border-radius:14px;border:1px solid rgba(142,255,117,.22);background:#061006;color:white"><input id="email" type="email" required placeholder="Email" style="padding:15px;border-radius:14px;border:1px solid rgba(142,255,117,.22);background:#061006;color:white"><input id="password" type="password" required minlength="8" placeholder="Password" style="padding:15px;border-radius:14px;border:1px solid rgba(142,255,117,.22);background:#061006;color:white"><div class="portal-cta"><button class="cinema-button primary" name="mode" value="signin">SIGN IN</button><button class="cinema-button" name="mode" value="signup">CREATE RICH ID</button></div><button class="cinema-button" id="recoverButton" type="button">RESET PASSWORD</button><p id="authStatus">AUTH READY</p></form></section></main><script type="module" src="/src/auth.js"></script></body></html>
