<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#020402"><title>Settings | Rich Bizness</title><link rel="stylesheet" href="/src/profile.css"></head><body data-identity-page="settings"><main class="id-page"><header class="id-top"><a class="id-brand" href="/"><span class="id-mark">RB</span><span><b>RICH BIZNESS</b><small>SETTINGS HUB</small></span></a><nav class="id-nav"><a href="/profile.html">PROFILE</a><a href="/edit.html">EDIT</a><a href="/avatar.html">AVATAR</a></nav></header><section class="panel"><span class="eyebrow">YOUR APP • YOUR VIBE</span><h1>Control The Universe</h1><p class="bio">One settings source controls language, privacy, motion, cinema, alerts, and the overall Rich Bizness feel.</p><form id="settingsForm" class="form-grid"><label class="field"><span class="label">APP LANGUAGE</span><select name="language"><option value="rich">RICH BIZNESS</option><option value="en">STANDARD ENGLISH</option></select></label><label class="field"><span class="label">TIMEZONE</span><input name="timezone" maxlength="80"></label><label class="field"><span class="label">DEFAULT THEME</span><select name="default_theme"><option value="smoke-cloud">SMOKE CLOUD</option><option value="gold-empire">GOLD EMPIRE</option><option value="omni-portal">OMNI PORTAL</option><option value="cinematic-night">CINEMATIC NIGHT</option></select></label><label class="field"><span class="label">ACCENT COLOR</span><input name="accent_color" type="color"></label><label class="field"><span class="label">MOTION LEVEL</span><select name="motion_level"><option value="full">FULL MOTION</option><option value="balanced">BALANCED</option><option value="reduced">REDUCED</option></select></label><label class="field"><span class="label">PROFILE VISIBILITY</span><select name="profile_visibility"><option value="public">PUBLIC</option><option value="followers">FOLLOWERS</option><option value="private">PRIVATE</option></select></label><label class="field"><span class="label">DM PRIVACY</span><select name="dm_privacy"><option value="everyone">EVERYONE</option><option value="followers">FOLLOWERS</option><option value="none">NOBODY</option></select></label><label class="field"><span class="label">RICH ALERTS</span><select name="notification_level"><option value="all">ALL ALERTS</option><option value="important">IMPORTANT ONLY</option><option value="silent">SILENT</option></select></label><label class="field"><span class="label">CINEMA MODE</span><input name="cinema_mode" type="checkbox"></label><label class="field"><span class="label">TV MODE</span><input name="tv_mode" type="checkbox"></label><div class="field full"><div class="form-actions"><button class="btn primary" type="submit">SAVE MY VIBE</button><a class="btn" href="/profile.html">BACK TO PROFILE</a></div></div></form></section><footer><span class="status" id="identityStatus">LOADING SETTINGS</span></footer></main><script type="module" src="/src/identity.js"></script></body></html>
