<!doctype html>
<html lang="en" data-section="notifications">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" /><meta name="theme-color" content="#020402" /><title>Rich Alerts - Rich Bizness</title><link rel="stylesheet" href="/src/identity-stack.css?v=identity-stack-3" /></head>
<body data-section="notifications"><div class="identity-bg"></div><main class="identity-shell"><header class="identity-top"><a class="identity-brand" href="/"><span class="identity-crest">RB</span><span><b>RICH BIZNESS</b><small>RICH ALERTS</small></span></a><nav class="identity-actions"><a class="identity-pill" href="/messages.html">RICH-DM’s</a><a class="identity-pill" href="/settings.html">SETTINGS</a><a class="identity-pill" href="/profile.html">PROFILE</a></nav></header><section class="identity-hero"><div class="identity-hero-inner"><div class="identity-copy"><div class="identity-kicker">Alert Lane</div><h1>Rich Alerts</h1><p>Alerts use notification rows, read receipts, groups, and device heartbeat.</p><div class="identity-stats"><span><b id="recordCount">0</b><small>Alerts</small></span><span><b id="unreadCount">0</b><small>Unread</small></span><span><b id="deviceState">OFF</b><small>Device</small></span></div></div><section class="identity-panel"><h2>Alerts</h2><div id="sectionCards" class="cards"><div class="empty">Checking alerts...</div></div></section></div></section><section class="identity-grid"><a class="identity-card hot" data-icon="✉" href="/messages.html"><b>Rich-DM’s</b><small>Threads</small></a><a class="identity-card" data-icon="⚙" href="/settings.html"><b>Settings</b><small>Control</small></a><a class="identity-card" data-icon="◉" href="/live.html"><b>WE LIT</b><small>Live</small></a><a class="identity-card" data-icon="$" href="/store.html"><b>Store</b><small>Market</small></a></section></main><script type="module">import { supabase } from '/src/supabase-client.js';import { getSessionUser } from '/src/rb-identity.js?v=profile-avatar-separate-1';const $=s=>document.querySelector(s);let user=null,rows=[];function card(r){const href=r.action_url||r.target_url||'#';const title=r.emoji?`${r.emoji} ${r.title||r.type||'Rich Alert'}`:(r.title||r.type||'Rich Alert');return `<article class="card" data-alert="${r.id}"><b>${title}</b><p>${r.body||'Rich Bizness activity.'}</p><small>${r.is_read?'READ':'NEW'} • ${r.priority||'normal'} • ${r.target_type||r.target_table||'activity'}</small><p><button class="identity-pill" data-read="${r.id}">MARK READ</button>${href!=='#'?` <a class="identity-pill primary" href="${href}">${r.action_label||'OPEN'}</a>`:''}</p></article>`}async function device(){if(!user)return;await supabase.from('push_devices').upsert({user_id:user.id,device_key:navigator.userAgent.slice(0,120),platform:'web',is_active:true,last_seen_at:new Date().toISOString()},{onConflict:'user_id,device_key'}).then(()=>{$('#deviceState').textContent='ON'},()=>{$('#deviceState').textContent='OFF'})}async function markRead(id){await supabase.from('notification_reads').upsert({notification_id:id,user_id:user.id,read_at:new Date().toISOString()},{onConflict:'notification_id,user_id'}).then(()=>{},()=>{});await supabase.from('rich_notifications').update({is_read:true,read_at:new Date().toISOString()}).eq('id',id).eq('user_id',user.id).then(()=>{},()=>{});load()}async function load(){user=user||await getSessionUser();if(!user){location.href='/auth.html?next=/notifications.html';return}await device();const {data,error}=await supabase.from('rich_notifications').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).limit(40);rows=data||[];$('#recordCount').textContent=rows.length.toLocaleString();$('#unreadCount').textContent=rows.filter(r=>!r.is_read).length.toLocaleString();$('#sectionCards').innerHTML=error?`<div class="empty">${error.message}</div>`:rows.length?rows.map(card).join(''):'<div class="empty">No alerts yet.</div>'}document.addEventListener('click',e=>{const btn=e.target.closest('[data-read]');if(btn)markRead(btn.dataset.read)});load();supabase.channel('rich-alerts-owned').on('postgres_changes',{event:'*',schema:'public',table:'rich_notifications'},load).subscribe();</script></body></html>
