<!doctype html>
<html lang="en" data-rb-page="auth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020402" />
    <title>Rich Access • Rich Bizness Universe</title>
    <link rel="stylesheet" href="/src/auth.css?v=connected-shell-1" />
  </head>
  <body data-rb-page="auth" data-section="auth">
    <main class="auth-screen">
      <section class="auth-hero" aria-hidden="true">
        <div class="auth-portal"><span>RB</span></div>
        <div class="auth-avatar"><i></i><b>RB</b></div>
      </section>
      <section class="auth-card">
        <div class="brand"><span>RB</span><p>RICH BIZNESS<br><small>UNIVERSE ACCESS</small></p></div>
        <h1>RICH ACCESS</h1>
        <p class="sub">Tap in, build your avatar, unlock WE LIT🔥, games, music, store, meta, and your Rich wallet.</p>
        <form id="authForm">
          <label>Email<input id="email" type="email" autocomplete="email" required placeholder="you@email.com" /></label>
          <label>Password<input id="password" type="password" autocomplete="current-password" required minlength="6" placeholder="••••••••" /></label>
          <label>Display name<input id="displayName" type="text" autocomplete="name" placeholder="ThatboyTayThou" /></label>
          <div class="actions"><button type="submit" data-mode="signin">TAP IN</button><button type="button" id="createBtn">CREATE ID</button></div>
        </form>
        <a class="ghost" href="/">BACK TO UNIVERSE</a>
        <p id="status" class="status">Secure portal ready.</p>
      </section>
    </main>
    <script type="module" src="/src/auth.js?v=connected-shell-1"></script>
  </body>
</html>
