<!doctype html>
<html lang="en" data-section="messages">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#020402" />
  <title>Rich DMs - Rich Bizness</title>
  <link rel="stylesheet" href="/src/identity-stack.css?v=identity-stack-3" />
  <link rel="stylesheet" href="/features/messages/styles.css?v=messages-feature-2" />

<body data-section="messages">
  <div class="identity-bg"></div>
  <main class="identity-shell messages-page">
    <header class="identity-top">
      <a class="identity-brand" href="/">
        <span class="identity-crest">RB</span>
        <span><b>RICH BIZNESS</b><small>RICH DMS</small></span>
      </a>
      <nav class="identity-actions">
        <a class="identity-pill" href="/notifications.html">ALERTS</a>
        <a class="identity-pill" href="/profile.html">PROFILE</a>
        <a class="identity-pill" href="/settings.html">SETTINGS</a>
      </nav>
    </header>

    <section class="messages-hero">
      <div>
        <div class="identity-kicker">Private communication</div>
        <h1>Rich DMs</h1>
        <p>Message, share media, react, track reads, and move into Rich Calls from one private workspace.</p>
      </div>
      <div class="messages-stats" aria-label="Messages overview">
        <span><b id="recordCount">0</b><small>Threads</small></span>
        <span><b id="memberCount">0</b><small>Connections</small></span>
        <span><b id="messageCount">0</b><small>Messages</small></span>
      </div>
    </section>

    <section id="messagesMount" aria-live="polite"></section>
  </main>
  <script type="module" src="/pages/messages.js?v=messages-page-2"></script>
