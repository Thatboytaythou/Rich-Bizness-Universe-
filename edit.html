<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#020402"><title>Edit Profile | Rich Bizness</title><link rel="stylesheet" href="/src/profile.css"></head><body data-identity-page="edit"><main class="id-page"><header class="id-top"><a class="id-brand" href="/"><span class="id-mark">RB</span><span><b>RICH BIZNESS</b><small>EDIT PROFILE</small></span></a><nav class="id-nav"><a href="/profile.html">PROFILE</a><a href="/avatar.html">AVATAR</a><a href="/settings.html">SETTINGS</a></nav></header><section class="panel"><span class="eyebrow">ONE IDENTITY • EVERY SECTION</span><h1>Build Your Empire Card</h1><p class="bio">Update the profile source used across Live, Music, Store, Gaming, Sports, Gallery, Upload, and Meta.</p><form id="profileForm" class="form-grid"><label class="field"><span class="label">DISPLAY NAME</span><input name="display_name" maxlength="80" required></label><label class="field"><span class="label">USERNAME</span><input name="username" maxlength="32" pattern="[a-z0-9_]{3,32}" required></label><label class="field"><span class="label">FULL NAME</span><input name="full_name" maxlength="120"></label><label class="field"><span class="label">FAVORITE SECTION</span><select name="favorite_section"><option value="profile">PROFILE</option><option value="feed">FEED</option><option value="live">LIVE</option><option value="watch">WATCH</option><option value="music">MUSIC</option><option value="podcast">PODCAST</option><option value="radio">RADIO</option><option value="store">STORE</option><option value="gaming">GAMING</option><option value="sports">SPORTS</option><option value="gallery">GALLERY</option><option value="meta">META</option></select></label><label class="field full"><span class="label">BIO</span><textarea name="bio" maxlength="500"></textarea></label><label class="field"><span class="label">AVATAR URL</span><input name="avatar_url" type="url" inputmode="url"></label><label class="field"><span class="label">BANNER URL</span><input name="banner_url" type="url" inputmode="url"></label><label class="field"><span class="label">WEBSITE</span><input name="website_url" type="url"></label><label class="field"><span class="label">INSTAGRAM</span><input name="instagram_url" type="url"></label><label class="field"><span class="label">YOUTUBE</span><input name="youtube_url" type="url"></label><label class="field"><span class="label">TIKTOK</span><input name="tiktok_url" type="url"></label><label class="field"><span class="label">FACEBOOK</span><input name="facebook_url" type="url"></label><label class="field"><span class="label">SNAPCHAT</span><input name="snapchat_url" type="url"></label><div class="field full"><div class="form-actions"><button class="btn primary" type="submit">LOCK IN PROFILE</button><a class="btn" href="/profile.html">VIEW EMPIRE CARD</a></div></div></form></section><footer><span class="status" id="identityStatus">LOADING PROFILE</span></footer></main><script type="module" src="/src/identity.js"></script></body></html>
