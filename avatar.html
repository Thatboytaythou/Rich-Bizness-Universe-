<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#020402" />
  <title>Avatar • Rich Bizness Universe</title>
  <link rel="stylesheet" href="/src/avatar.css?v=avatar-1" />
</head>
<body>
  <main class="avatar-screen">
    <header class="avatar-top"><a href="/">RB</a><span>CREATOR MODE</span><button id="outBtn">I'M OUT</button></header>
    <section class="avatar-grid">
      <div class="avatar-preview"><div class="portal-ring"></div><div id="avatarBody" class="avatar-body"><span>RB</span></div></div>
      <form id="avatarForm" class="avatar-panel">
        <p>FULL BODY CINEMA AVATAR</p>
        <h1>BUILD YOUR META ID</h1>
        <label>Display Name<input id="displayName" /></label>
        <label>Aura<select id="aura"><option>Emerald Gold</option><option>Galaxy Smoke</option><option>Royal Flame</option></select></label>
        <label>Outfit<select id="outfit"><option>Rich Default</option><option>Black Gold Boss</option><option>Creator Hoodie</option></select></label>
        <label>Motion<select id="motion"><option>Boss Idle</option><option>Portal Walk</option><option>Smoke Burst</option></select></label>
        <button>SAVE AVATAR</button>
        <small id="status">Avatar engine ready.</small>
      </form>
    </section>
  </main>
  <script type="module" src="/src/avatar.js?v=avatar-1"></script>
</body>
</html>
