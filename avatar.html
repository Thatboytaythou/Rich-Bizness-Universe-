<!doctype html>
<html lang="en" data-rb-page="avatar" data-section="avatar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#020402" />
  <title>Rich Avatar - Rich Bizness Universe</title>
  <link rel="stylesheet" href="/src/section-page.css?v=one-app-dock-2" />
  <link rel="stylesheet" href="/src/avatar.css?v=avatar-stick-2" />
  <link rel="stylesheet" href="/src/avatar-connected.css?v=avatar-stick-2" />
  <link rel="stylesheet" href="/src/avatar-clean.css?v=avatar-clean-2" />
</head>
<body data-rb-page="avatar" data-section="avatar">
  <main class="avatar-screen section-screen">
    <header class="top">
      <a class="brand" href="/"><span class="crest">RB</span><span><b>RICH BIZNESS</b><small>RICH AVATAR</small></span></a>
      <nav class="top-actions"><a class="pill" href="/profile.html">PROFILE LOCK</a><a class="pill" href="/settings.html">SETTINGS</a></nav>
    </header>
    <section class="avatar-grid">
      <div class="avatar-preview"><div class="portal-ring"></div><div id="avatarBody" class="avatar-body"></div><div class="avatar-stage-label" id="stageLabel">BOSS IDLE</div></div>
      <form id="avatarForm" class="avatar-panel">
        <p>FULL BODY RICH BIZNESS CHARACTER</p><h1>BUILD YOUR RICH AVATAR</h1>
        <label>Display Name<input id="displayName" /></label>
        <label>Aura<select id="aura"><option>Emerald Gold</option><option>Galaxy Smoke</option><option>Royal Flame</option><option>Diamond Mist</option><option>Neon Phantom</option></select></label>
        <label>Outfit<select id="outfit"><option>Rich Default</option><option>Black Gold Boss</option><option>Creator Hoodie</option><option>Meta Armor</option><option>Street Legend</option><option>Executive Suit</option></select></label>
        <label>Motion<select id="motion"><option>Boss Idle</option><option>Boss Walk</option><option>Portal Walk</option><option>Smoke Burst</option><option>Power Up</option><option>Dance Flex</option><option>Combat Ready</option></select></label>
        <div class="avatar-quick"><button type="button" data-preset="boss">BOSS</button><button type="button" data-preset="creator">CREATOR</button><button type="button" data-preset="meta">META</button><button type="button" data-preset="hero">HERO</button><button type="button" data-preset="villain">VILLAIN</button><button type="button" data-preset="ninja">NINJA</button><button type="button" data-preset="movie">MOVIE</button><button type="button" data-preset="dash">DASH</button><button type="button" data-randomize>RANDOM</button></div>
        <div class="stats"><span><b data-xp-level>LEVEL 1</b><small>LEVEL</small></span><span><b data-xp-rank>BIZ LEGEND</b><small>RANK</small></span><span><b data-xp-total>0 XP</b><small>XP</small></span></div>
        <button>SAVE AVATAR</button><small id="status">Rich avatar engine ready.</small>
      </form>
    </section>
  </main>
  <script type="module" src="/src/section-runtime.js?v=one-app-dock-2"></script>
  <script type="module" src="/src/avatar.js?v=avatar-stick-2"></script>
  <script type="module" src="/src/avatar-stick.js?v=avatar-stick-2"></script>
  <script type="module" src="/src/avatar-xp.js?v=realtime-1"></script>
</body>
</html>
