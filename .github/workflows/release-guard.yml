name: Release Guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    name: Build and integrity
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Validate routes and imports
        run: npm run validate
      - name: Build production bundle
        run: npm run build

  production-smoke:
    name: Production route smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: integrity
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Wait for Vercel deployment
        run: sleep 35
      - name: Verify production routes
        env:
          RB_ORIGIN: https://rich-bizness.com
        run: node scripts/production-smoke.mjs
